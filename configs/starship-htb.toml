# Starship Config - Hack The Box Theme
# Two-line prompt with OS icon + username
# git_status DISABLED for performance
# HTB Brand: #9FEF00 neon green on #141D2B dark navy

format = """
[┌─](bold green) $os$username in $directory$git_branch$python$cmd_duration
[└─](bold green)$character"""

add_newline = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[os]
disabled = false
format = "[$symbol]($style) "
style = "bold green"

[os.symbols]
Windows = ""

[username]
show_always = true
format = "[$user]($style)"
style_user = "bold green"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
read_only = " 󰌾"

[git_branch]
format = " on [$symbol$branch]($style)"
symbol = " "
style = "bold green"

[git_status]
disabled = true

[python]
format = '[ $virtualenv]($style)'
style = "green"
detect_extensions = []
detect_files = []

[nodejs]
disabled = true

[package]
disabled = true

[cmd_duration]
min_time = 2000
format = " took [$duration]($style)"
style = "bold yellow"
